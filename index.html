<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apsara Tracking</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2);
  min-height:100vh;
  padding:20px;
}

.container{
  max-width:500px;
  margin:50px auto;
  background:rgba(255,255,255,0.95);
  padding:25px;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

h1{
  text-align:center;
  color:#333;
}

input{
  width:100%;
  padding:14px;
  border:2px solid #ddd;
  border-radius:12px;
  font-size:16px;
}

button{
  width:100%;
  padding:14px;
  background:#6c63ff;
  color:white;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  opacity:.9;
}

#result{
  margin-top:20px;
  background:#f8f9fa;
  padding:15px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="container">

<h1>📦 Apsara Tracking</h1>
<p style="text-align:center;color:#666;">
Track your order instantly
</p>

<input id="search" placeholder="Enter Name or Pincode">

<button onclick="searchOrder()">Search</button>

<div id="result">
Search your order...
</div>

</div>

<script>

const supabaseUrl = "https://jfpvjoflqnrneiqsmcxl.supabase.co";
const supabaseKey = "sb_publishable_DdL4eMgYt-krkQIWX9F5wg_GDvg2eun";
const supabaseClient =
supabase.createClient(
supabaseUrl,
supabaseKey
);

async function searchOrder(){

const value =
document.getElementById("search")
.value
.trim();

if(!value){

document.getElementById("result")
.innerHTML =
"Please enter Name or Pincode";

return;
}

let { data , error } =
await supabaseClient
.from("tracking_orders")
.select("*");

if(error){

document.getElementById("result")
.innerHTML =
"Database Error";

return;
}

const results =
data.filter(item =>

(item.customer_name || "")
.toLowerCase()
.includes(value.toLowerCase())

||

String(item.pincode || "")
.includes(value)

);

if(results.length === 0){

document.getElementById("result")
.innerHTML =
"No tracking found";

return;
}

let html =
`<h3>📦 ${results.length} Order(s) Found</h3>`;

results.forEach(result => {

let tracking =
result.tracking_id || "";

let courier =
"Delhivery";

if(tracking.startsWith("11")){
courier =
"Tirupati Courier";
}
else if(
tracking.toUpperCase()
.startsWith("SHCP")
){
courier =
"Ekart";
}
else if(
tracking.toUpperCase()
.startsWith("C")
){
courier =
"Indian Post";
}

html += `

<div style="
background:white;
padding:15px;
margin-top:12px;
border-radius:12px;
border-left:5px solid #6c63ff;
">

<p>
<b>Tracking ID:</b><br>
${tracking}
</p>

<p>
<b>Courier Company:</b><br>
${courier}
</p>

<p>
<b>Dispatch Date:</b><br>
${result.dispatch_date || "Not Available"}
</p>

<p>
<b>Pincode:</b><br>
${result.pincode || "Not Available"}
</p>

</div>

`;

});

document.getElementById("result")
.innerHTML =
html;

}

</script>
</body> </html>
