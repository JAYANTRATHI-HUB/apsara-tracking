<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apsara Tracking</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
background:black;
color:white;
border:none;
cursor:pointer;
}

#result{
margin-top:20px;
padding:10px;
background:#eee;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Apsara Tracking</h1>

<input id="search" placeholder="Enter Mobile Number or Name">

<button onclick="searchOrder()">Search</button>

<div id="result">
Search your order...
</div>

</div>

<script>
function searchOrder(){

let value=document.getElementById("search").value;

document.getElementById("result").innerHTML=
"Searching for: <b>"+value+"</b><br><br>Database connection coming next step.";

}
</script>

</body>
</html>
