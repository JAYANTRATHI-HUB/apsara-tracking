<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apsara Tracking</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2);
  min-height:100vh;
  padding:20px;
}
.container{
  max-width:500px;
  margin:50px auto;
  background:rgba(255,255,255,0.95);
  padding:25px;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
}
h1{
  text-align:center;
  color:#333;
}
input{
  width:100%;
  padding:14px;
  border:2px solid #ddd;
  border-radius:12px;
  font-size:16px;
  box-sizing:border-box;
}
button{
  width:100%;
  padding:14px;
  background:#6c63ff;
  color:white;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
  margin-top:10px;
}
button:hover{ opacity:.9; }
button:disabled{ opacity:.6; cursor:not-allowed; }
#result{
  margin-top:20px;
  background:#f8f9fa;
  padding:15px;
  border-radius:12px;
}

/* Estimated delivery badge */
.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:20px;
  font-size:13px;
  font-weight:bold;
  margin-top:4px;
}
.badge-green{ background:#e0f7e9; color:#1a7a3c; }
.badge-orange{ background:#fff3e0; color:#e65100; }
.badge-blue{ background:#e3f2fd; color:#1565c0; }

/* Copy button */
.copy-btn{
  background:#f0eeff;
  color:#6c63ff;
  border:1px solid #6c63ff;
  border-radius:8px;
  padding:4px 10px;
  font-size:12px;
  cursor:pointer;
  margin-left:8px;
  width:auto;
  margin-top:0;
  vertical-align:middle;
}
.copy-btn:hover{ background:#6c63ff; color:white; }

/* Track & WhatsApp buttons */
.action-btn{
  display:inline-block;
  padding:10px 14px;
  border-radius:10px;
  font-size:14px;
  font-weight:bold;
  text-decoration:none;
  text-align:center;
  cursor:pointer;
  border:none;
  margin-top:6px;
  width:auto;
}
.btn-track{
  background:#6c63ff;
  color:white;
  margin-right:8px;
}
.btn-whatsapp{
  background:#25D366;
  color:white;
}

/* No result box */
.no-result-box{
  background:#fff8f0;
  border:1px solid #f0d9b5;
  border-radius:12px;
  padding:18px;
  text-align:center;
  color:#555;
}
.no-result-box a{
  display:inline-block;
  margin-top:10px;
  background:#25D366;
  color:white;
  padding:10px 20px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>
<body>
<div class="container">
  <h1>📦 Apsara </h1>
  <p style="text-align:center;color:#666;">Track your order instantly</p>

  <input id="search" placeholder="Enter Name, Pincode or  ID"
         onkeydown="if(event.key==='Enter') searchOrder()">
  <button id="searchBtn" onclick="searchOrder()">🔍 Search</button>

  <div id="result">Search your order...</div>
</div>

<script>
const supabaseUrl = "https://jfpvjoflqnrneiqsmcxl.supabase.co";
const supabaseKey = "sb_publishable_DdL4eMgYt-krkQIWX9F5wg_GDvg2eun";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

const WHATSAPP_NUMBER = "917221812345"; // 🔧 Replace with your WhatsApp number (with country code, no +)

function getCourier(trackingId) {   
  const t = trackingId || "";
  if (t.startsWith("11"))                    return "Tirupati Courier";
  if (t.toUpperCase().startsWith("SHCP"))    return "Ekart";
  if (t.toUpperCase().startsWith("ESAP"))    return "Ekart";
  if (t.toUpperCase().startsWith("C"))       return "Indian Post";
  return "Delhivery";
}

function getTrackingLink(courier, trackingId) {
  const t = encodeURIComponent(trackingId);
  if (courier === "Delhivery")       return `https://www.delhivery.com/track/package/${t}`;
  if (courier === "Ekart") return `https://ekartlogistics.com/shipmenttrack/${t}`;
  if (courier === "Indian Post")     return `https://www.indiapost.gov.in/_layouts/15/dop.portal.tracking/trackconsignment.aspx`;
  if (courier === "Tirupati Courier") return `https://trackcourier.io/track-and-trace/tirupati-courier/${t}`;
  return null; // Tirupati has no standard tracking URL
}

function getEstimatedDelivery(dispatchDate) {
  if (!dispatchDate) return null;

  // Support both DD.MM.YYYY and YYYY-MM-DD formats
  let dateObj;
  if (dispatchDate.includes(".")) {
    const [d, m, y] = dispatchDate.split(".");
    dateObj = new Date(`${y}-${m}-${d}`);
  } else {
    dateObj = new Date(dispatchDate);
  }

  if (isNaN(dateObj)) return null;

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const daysSince = Math.floor((today - dateObj) / (1000 * 60 * 60 * 24));

  if (daysSince < 0)   return { label: "Dispatching soon",        css: "badge-blue" };
  if (daysSince <= 2)  return { label: "Expected in 3–5 days",    css: "badge-orange" };
  if (daysSince <= 5)  return { label: "Expected in 1–3 days",    css: "badge-orange" };
  if (daysSince <= 8)  return { label: "Should be delivered",      css: "badge-green" };
  return               { label: "Check courier for latest update", css: "badge-blue" };
}

function copyToClipboard(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = "✅ Copied!";
    setTimeout(() => { btn.textContent = "📋 Copy"; }, 2000);
  });
}

function sanitize(str) {
  return String(str || "").replace(/[<>&"]/g, c =>
    ({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c])
  );
}

async function searchOrder() {
  const value = document.getElementById("search").value.trim();
  const resultDiv = document.getElementById("result");
  const btn = document.getElementById("searchBtn");

  if (!value) {
    resultDiv.innerHTML = "⚠️ Please enter a Name, Pincode or Tracking ID.";
    return;
  }

  btn.textContent = "Searching...";
  btn.disabled = true;

  try {
    let { data, error } = await supabaseClient
      .from("tracking_orders")
      .select("*");

    if (error) {
      resultDiv.innerHTML = "⚠️ Database error. Please try again.";
      return;
    }

    const isPin = /^\d{4,6}$/.test(value);

    const results = data.filter(item => {
      const nameMatch = (item.customer_name || "").toLowerCase().includes(value.toLowerCase());
      const pinMatch  = String(item.pincode || "").includes(value);
      const trackMatch = (item.tracking_id || "").toLowerCase() === value.toLowerCase();
      return isPin ? pinMatch : (nameMatch || trackMatch);
    });

    if (results.length === 0) {
      const waMsg = encodeURIComponent(`Hi, I can't find my order. I searched for: ${value}`);
      resultDiv.innerHTML = `
        <div class="no-result-box">
          <p style="font-size:22px;margin:0">😕</p>
          <p><b>No tracking found</b></p>
          <p style="font-size:14px;color:#888">
            Please check your name or pincode spelling.<br>
            You can also contact us on WhatsApp for help.
          </p>
          <a href="https://wa.me/${WHATSAPP_NUMBER}?text=${waMsg}" target="_blank">
            💬 Contact on WhatsApp
          </a>
        </div>`;
      return;
    }

    results.sort((a, b) => {
      const da = a.dispatch_date ? a.dispatch_date.split(".").reverse().join("") : "0";
      const db = b.dispatch_date ? b.dispatch_date.split(".").reverse().join("") : "0";
      return db.localeCompare(da);
    });

    const safeVal = sanitize(value);
    let html = `<h3>📦 ${results.length} Order(s) Found</h3>
                <p><b>Searched:</b> ${safeVal}</p>`;

    results.forEach((result, index) => {
      const tracking  = result.tracking_id || "";
      const courier   = getCourier(tracking);
      const trackLink = getTrackingLink(courier, tracking);
      const eta       = getEstimatedDelivery(result.dispatch_date);
      const safeTrack = sanitize(tracking);

      const waText = encodeURIComponent(
        `My Order Details:\nName: ${result.customer_name}\nTracking ID: ${tracking}\nCourier: ${courier}\nDispatch Date: ${result.dispatch_date || "N/A"}\nPincode: ${result.pincode || "N/A"}`
      );

      html += `
        <div style="background:white;padding:15px;margin-top:12px;border-radius:12px;border-left:5px solid #6c63ff;">
          <p>
            <b>Customer Name:</b><br>
            ${sanitize(result.customer_name) || "Not Available"}
          </p>
          <p>
            <b>Tracking ID:</b><br>
            <span id="tid-${index}">${safeTrack || "Not Available"}</span>
            ${tracking ? `<button class="copy-btn" onclick="copyToClipboard('${safeTrack}', this)">📋 Copy</button>` : ""}
          </p>
          <p>
            <b>Courier Company:</b><br>
            ${courier}
          </p>
          <p>
            <b>Dispatch Date:</b><br>
            ${sanitize(result.dispatch_date) || "Not Available"}
            ${eta ? `<br><span class="badge ${eta.css}">${eta.label}</span>` : ""}
          </p>
          <p>
            <b>Pincode:</b><br>
            ${sanitize(result.pincode) || "Not Available"}
          </p>
          <div style="margin-top:10px;">
            ${trackLink
              ? `<a href="${trackLink}" target="_blank" class="action-btn btn-track">🔍 Track Shipment</a>`
              : 
            }
            <a href="https://wa.me/${WHATSAPP_NUMBER}?text=${waText}" target="_blank" class="action-btn btn-whatsapp">💬 Share on WhatsApp</a>
          </div>
        </div>`;
    });

    resultDiv.innerHTML = html;

  } finally {
    btn.textContent = "🔍 Search";
    btn.disabled = false;
  }
}
</script>
</body>
</html>
