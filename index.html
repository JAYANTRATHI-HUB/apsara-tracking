<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apsara Tracking</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:10px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:black;
color:white;
border:none;
cursor:pointer;
}

#result{
margin-top:20px;
padding:15px;
background:#eee;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Apsara Tracking</h1>

<input id="search" placeholder="Enter Mobile Number or Name">

<button onclick="searchOrder()">Search</button>

<div id="result">
Search your order...
</div>

</div>

<script>

const supabaseUrl = "https://jfpvjoflqnrneiqsmcxl.supabase.co";
const supabaseKey = "sb_publishable_DdL4eMgYt-krkQIWX9F5wg_GDvg2eun";

const supabaseClient = supabase.createClient(
supabaseUrl,
supabaseKey
);

async function searchOrder(){

const value =
document.getElementById("search").value.trim();

if(!value){
document.getElementById("result").innerHTML =
"Please enter name or mobile number";
return;
}

let { data, error } = await supabaseClient
.from("tracking_orders")
.select("*");

if(error){
document.getElementById("result").innerHTML =
"Database error";
return;
}

const result = data.find(item =>
(item.customer_name || "")
.toLowerCase()
.includes(value.toLowerCase())
||
(item.mobile_number || "")
.includes(value)
);

if(!result){
document.getElementById("result").innerHTML =
"No tracking found";
return;
}

document.getElementById("result").innerHTML = `
<b>Tracking ID:</b> ${result.tracking_id}<br><br>
<b>Courier:</b> ${result.courier_company}<br><br>
<b>Date:</b> ${result.dispatch_date || "Not Available"}
`;

}

</script>

</body>
</html>
